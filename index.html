<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Jeffrey's Weekly List" />
<title>Jeffrey's Weekly List</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<link rel="icon" href="icon.png" type="image/png" sizes="32x32" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --orange: #D85A30;
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --text: #1a1a1a;
    --text-muted: #666;
    --text-faint: #999;
    --check-border: rgba(0,0,0,0.25);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161614; --surface: #1f1f1d;
      --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
      --text: #f0ede8; --text-muted: #999; --text-faint: #666;
      --check-border: rgba(255,255,255,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 520px; margin: 0 auto; padding: 20px 16px 60px; }
  .app-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .week-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 2px; }
  .week-range { font-size: 13px; color: var(--text-muted); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .hbtn { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 0 10px; height: 32px; cursor: pointer; color: var(--text-muted); font-size: 12px; font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; transition: background .15s; }
  .hbtn:active { background: var(--border); }
  .hbtn.orange { color: var(--orange); border-color: var(--orange); }
  .progress-wrap { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 1px; transition: width .4s; }
  .quick-bar { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface); border-radius: 12px; margin-bottom: 20px; border: 0.5px solid var(--border); }
  .quick-bar input { flex: 1; border: none; background: none; font-size: 15px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; }
  .quick-bar input::placeholder { color: var(--text-faint); }
  .quick-bar select { border: 0.5px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text-muted); font-size: 12px; padding: 4px 6px; outline: none; cursor: pointer; font-family: 'Inter', sans-serif; }
  .day-block { border-top: 1.5px solid var(--border-strong); }
  .day-header-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 10px; cursor: pointer; user-select: none; }
  .day-title { font-size: 24px; font-weight: 900; letter-spacing: -.02em; color: var(--text); text-transform: uppercase; line-height: 1; }
  .day-meta { font-size: 12px; color: var(--text-faint); margin-top: 3px; }
  .day-header-right { display: flex; align-items: center; gap: 8px; }
  .day-count { font-size: 12px; color: var(--text-faint); }
  .chevron { font-size: 16px; color: var(--text-faint); transition: transform .2s; display: inline-block; }
  .chevron.open { transform: rotate(180deg); }
  .day-body { padding-bottom: 12px; }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .task-row:last-of-type { border-bottom: none; }
  .check-box { width: 22px; height: 22px; border-radius: 5px; border: 1.5px solid var(--check-border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; background: none; }
  .check-box.checked { background: var(--orange); border-color: var(--orange); }
  .check-box.cal { border-color: var(--orange); }
  .task-label { flex: 1; font-size: 16px; color: var(--text); line-height: 1.3; }
  .task-label.done { text-decoration: line-through; color: var(--text-faint); }
  .task-time { font-size: 11px; color: var(--orange); font-weight: 700; flex-shrink: 0; }
  .cal-badge { font-size: 10px; font-weight: 700; color: var(--orange); flex-shrink: 0; }
  .pri-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .p-high { background: #E24B4A; } .p-med { background: #EF9F27; } .p-low { background: #1D9E75; }
  .task-del { background: none; border: none; cursor: pointer; color: var(--text-faint); font-size: 16px; padding: 6px; opacity: 0.4; flex-shrink: 0; }
  .add-row { display: flex; align-items: center; gap: 8px; padding: 10px 0 2px; }
  .add-row input { flex: 1; border: none; background: none; font-size: 16px; font-family: 'Inter', sans-serif; color: var(--text); outline: none; padding: 0; }
  .add-row input::placeholder { color: var(--text-faint); }
  .add-row-btn { background: none; border: none; cursor: pointer; color: var(--orange); font-size: 24px; line-height: 1; padding: 0; flex-shrink: 0; }
  .status-bar { font-size: 11px; color: var(--text-faint); padding: 0 0 14px; display: flex; align-items: center; gap: 6px; min-height: 24px; }
  .spin { display: inline-block; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .app-logo { width: 32px; height: 32px; border-radius: 8px; }
  .footer-note { font-size: 11px; color: var(--text-faint); text-align: center; padding: 24px 0 0; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--surface); border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; max-height: 80vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-task { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
  .modal-task:last-of-type { border-bottom: none; }
  .modal-day-label { font-size: 10px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0; width: 28px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; transition: opacity .15s; }
  .modal-btn.primary { background: var(--orange); color: #fff; }
  .modal-btn.secondary { background: var(--border); color: var(--text-muted); }
  .modal-btn:hover { opacity: .85; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:10px">
      <img src="icon.png" class="app-logo" alt="Jeffrey's Weekly List" onerror="this.style.display='none'" />
      <div>
        <div class="week-label">Jeffrey's Weekly List</div>
        <div class="week-range" id="week-range"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="sort-btn"><i class="ti ti-arrow-up-down"></i> Sort</button>
      <button class="hbtn orange" id="cal-btn"><i class="ti ti-calendar"></i> <span id="cal-btn-label">Connect cal</span></button>
      <button class="hbtn" id="clear-btn"><i class="ti ti-trash"></i></button>
    </div>
  </div>

  <div class="status-bar" id="status-bar"></div>
  <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div class="quick-bar">
    <i class="ti ti-plus" style="font-size:15px;color:#D85A30"></i>
    <input type="text" id="quick-input" placeholder="Quick add a task..." autocomplete="off" />
    <select id="quick-day-sel"></select>
    <select id="quick-pri-sel">
      <option value="none">—</option>
      <option value="high">High</option>
      <option value="med">Med</option>
      <option value="low">Low</option>
    </select>
  </div>

  <div id="days-container"></div>
  <div class="footer-note">Plan less, do more.</div>
</div>

<div class="modal-overlay" id="reset-modal" style="display:none">
  <div class="modal">
    <h2>New week!</h2>
    <p>You have unfinished tasks from last week. What would you like to do?</p>
    <div id="modal-task-list"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modal-fresh">Start fresh</button>
      <button class="modal-btn primary" id="modal-carry">Carry all over</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, addDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyA_lIC5IA-DSxAXzViPDzc9PtEiQVZ_7mc",
  authDomain: "weekly-to-do-list-f6097.firebaseapp.com",
  projectId: "weekly-to-do-list-f6097",
  storageBucket: "weekly-to-do-list-f6097.firebasestorage.app",
  messagingSenderId: "943359567358",
  appId: "1:943359567358:web:4a79c0cd89027b02398caf"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const tasksCol = collection(db, 'tasks');
const archiveCol = collection(db, 'archived_tasks');

const CLIENT_ID = '670822661778-odsq06vdblqnrlsgjvb00fh15gffp5ru.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.calendars.readonly https://www.googleapis.com/auth/calendar.events.readonly';
const ORANGE = '#D85A30';
const TODAY = new Date();
const TK = 'wktodo_token';
const CK = 'wktodo_cal';
const DK = 'wktodo_caldate';
const RESET_KEY = 'wktodo_reset_week';

function getMonWeek(fromDate) {
  const d = fromDate || TODAY;
  const jsDay = d.getDay();
  const diff = jsDay === 0 ? -6 : 1 - jsDay;
  return Array.from({length:7}, (_, i) => {
    const dt = new Date(d); dt.setDate(d.getDate() + diff + i); return dt;
  });
}

const WEEK = getMonWeek();
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function dateKey(d) { return d.toISOString().slice(0,10); }
const todayColIdx = WEEK.findIndex(d => dateKey(d) === dateKey(TODAY));
const weekStartKey = dateKey(WEEK[0]);

document.getElementById('week-range').textContent = (() => {
  const s = WEEK[0], e = WEEK[6];
  const mo = d => d.toLocaleDateString('en-US', {month:'short'});
  return mo(s) + ' ' + s.getDate() + ' - ' + mo(e) + ' ' + e.getDate() + ', ' + e.getFullYear();
})();

let tasks = [];
let sortMode = null, collapsed = {}, dragId = null;
let calTasks = [];
let accessToken = localStorage.getItem(TK) || null;
let resetHandled = false;

function setStatus(msg, spin) {
  const el = document.getElementById('status-bar');
  el.innerHTML = spin ? '<i class="ti ti-refresh spin"></i> ' + msg : msg;
}

function fmtTime(iso) {
  if (!iso || iso.length === 10) return '';
  const d = new Date(iso); if (isNaN(d)) return '';
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
  return m ? h + ':' + String(m).padStart(2,'0') + ap : h + ap;
}

function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function isTaskFromPreviousWeek(task) {
  if (task.weekStart && task.weekStart < weekStartKey) return true;
  return false;
}

async function archiveTask(task) {
  try {
    await addDoc(archiveCol, { ...task, archivedAt: new Date().toISOString() });
    await deleteDoc(doc(db, 'tasks', String(task.id)));
  } catch(e) { console.error('Archive failed', e); }
}

async function handleWeekReset(oldTasks) {
  const lastResetWeek = localStorage.getItem(RESET_KEY);
  if (lastResetWeek === weekStartKey) return;
  if (oldTasks.length === 0) {
    localStorage.setItem(RESET_KEY, weekStartKey);
    return;
  }

  const modal = document.getElementById('reset-modal');
  const taskList = document.getElementById('modal-task-list');
  taskList.innerHTML = '';
  oldTasks.forEach(t => {
    const row = document.createElement('div');
    row.className = 'modal-task';
    row.innerHTML = '<span class="modal-day-label">' + DAY_SHORT[t.day] + '</span><span style="flex:1">' + t.text + '</span>';
    taskList.appendChild(row);
  });

  modal.style.display = 'flex';

  document.getElementById('modal-carry').onclick = async () => {
    modal.style.display = 'none';
    localStorage.setItem(RESET_KEY, weekStartKey);
    for (const t of oldTasks) {
      const newTask = { ...t, id: newId(), weekStart: weekStartKey, done: false };
      await setDoc(doc(db, 'tasks', String(newTask.id)), newTask);
      await archiveTask(t);
    }
  };

  document.getElementById('modal-fresh').onclick = async () => {
    modal.style.display = 'none';
    localStorage.setItem(RESET_KEY, weekStartKey);
    for (const t of oldTasks) {
      await archiveTask(t);
    }
  };
}

// Firebase real-time sync
setStatus('Connecting...', true);
onSnapshot(query(tasksCol), async (snapshot) => {
  tasks = snapshot.docs.map(d => ({ ...d.data(), id: d.id }));

  // Auto-archive completed tasks from previous weeks
  const completedOld = tasks.filter(t => t.weekStart && t.weekStart < weekStartKey && t.done);
  for (const t of completedOld) {
    await archiveTask(t);
  }

  // Check for incomplete tasks from previous weeks — show reset modal once
  if (!resetHandled) {
    resetHandled = true;
    const incompleteOld = tasks.filter(t => t.weekStart && t.weekStart < weekStartKey && !t.done);
    await handleWeekReset(incompleteOld);
  }

  setStatus('', false);
  render();
  updateProgress();
}, () => setStatus('Sync error - check connection', false));

async function saveTask(task) {
  const taskWithWeek = { ...task, weekStart: weekStartKey };
  try { await setDoc(doc(db, 'tasks', String(task.id)), taskWithWeek); }
  catch(e) { console.error('Save failed', e); }
}

async function removeTask(id) {
  try { await deleteDoc(doc(db, 'tasks', String(id))); }
  catch(e) { console.error('Delete failed', e); }
}

// Google Calendar
function updateCalBtn() {
  document.getElementById('cal-btn-label').textContent = accessToken ? 'Sync cal' : 'Connect cal';
}

async function fetchCalendar(force) {
  if (!accessToken) return;
  const todStr = dateKey(TODAY);
  const cached = localStorage.getItem(CK);
  const cachedD = localStorage.getItem(DK);
  if (!force && cached && cachedD === todStr) {
    try { return JSON.parse(cached); } catch(e) {}
  }
  setStatus('Syncing calendar...', true);
  const ws = WEEK[0].toISOString();
  const we = new Date(WEEK[6]); we.setHours(23,59,59);
  try {
    const resp = await fetch(
      'https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=' +
      encodeURIComponent(ws) + '&timeMax=' + encodeURIComponent(we.toISOString()) +
      '&singleEvents=true&orderBy=startTime&maxResults=50',
      { headers: { Authorization: 'Bearer ' + accessToken } }
    );
    if (resp.status === 401) {
      accessToken = null; localStorage.removeItem(TK); updateCalBtn();
      setStatus('Session expired - reconnect calendar', false); return;
    }
    const data = await resp.json();
    const events = (data.items || []).map(ev => ({
      title: ev.summary || 'Untitled',
      start: ev.start.dateTime || ev.start.date,
      allDay: !!ev.start.date && !ev.start.dateTime
    }));
    localStorage.setItem(CK, JSON.stringify(events));
    localStorage.setItem(DK, todStr);
    setStatus('Synced ' + events.length + ' event' + (events.length !== 1 ? 's' : ''), false);
    return events;
  } catch(err) {
    setStatus('Calendar sync failed', false);
    try { return JSON.parse(cached || '[]'); } catch(e) { return []; }
  }
}

function eventsToCalTasks(evs) {
  if (!evs) return [];
  return evs.flatMap(ev => {
    const s = ev.start || ''; let col = -1, time = '';
    if (ev.allDay || s.length === 10) {
      const ed = new Date(s + 'T00:00:00');
      col = WEEK.findIndex(d => dateKey(d) === dateKey(ed));
    } else {
      const ed = new Date(s);
      if (!isNaN(ed)) { col = WEEK.findIndex(d => dateKey(d) === dateKey(ed)); time = fmtTime(s); }
    }
    if (col < 0) return [];
    return [{ id: 'cal_' + Math.random().toString(36).slice(2), text: ev.title, day: col, done: false, isCal: true, time }];
  }).sort((a,b) => a.time.localeCompare(b.time));
}

function connectCalendar() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setStatus('Auth failed: ' + resp.error, false); return; }
      accessToken = resp.access_token;
      localStorage.setItem(TK, accessToken);
      updateCalBtn();
      const evs = await fetchCalendar(true);
      calTasks = eventsToCalTasks(evs);
      render();
    }
  });
  client.requestAccessToken();
}

document.getElementById('cal-btn').addEventListener('click', async () => {
  if (accessToken) {
    const evs = await fetchCalendar(true);
    calTasks = eventsToCalTasks(evs); render();
  } else { connectCalendar(); }
});

// Render
function allForDay(di) {
  const cal = calTasks.filter(t => t.day === di);
  const usr = tasks.filter(t => t.day === di && (!t.weekStart || t.weekStart >= weekStartKey));
  if (sortMode === 'priority') {
    const o = {high:0,med:1,low:2,none:3};
    return [...cal, ...usr].sort((a,b) => o[a.priority||'none'] - o[b.priority||'none']);
  }
  if (sortMode === 'status') return [...cal, ...usr].sort((a,b) => a.done - b.done);
  return [...cal, ...usr];
}

function updateProgress() {
  const currentTasks = tasks.filter(t => !t.weekStart || t.weekStart >= weekStartKey);
  const tot = currentTasks.length, don = currentTasks.filter(t => t.done).length;
  document.getElementById('prog').style.width = (tot ? Math.round(don/tot*100) : 0) + '%';
}

function render() {
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  WEEK.forEach((dt, di) => {
    const isToday = di === todayColIdx;
    const dayTasks = allForDay(di);
    const isOpen = collapsed[di] === undefined ? true : collapsed[di];
    const userTasks = tasks.filter(t => t.day === di && (!t.weekStart || t.weekStart >= weekStartKey));
    const userCount = userTasks.length;
    const doneCount = userTasks.filter(t => t.done).length;

    const block = document.createElement('div');
    block.className = 'day-block';

    const hrow = document.createElement('div');
    hrow.className = 'day-header-row';
    hrow.innerHTML =
      '<div>' +
        '<div class="day-title" style="' + (isToday ? 'color:'+ORANGE : '') + '">' + DAY_NAMES[di] + '</div>' +
        '<div class="day-meta">' + dt.toLocaleDateString('en-US', {month:'long', day:'numeric'}) + '</div>' +
      '</div>' +
      '<div class="day-header-right">' +
        (userCount ? '<span class="day-count">' + doneCount + '/' + userCount + '</span>' : '') +
        '<i class="ti ti-chevron-down chevron ' + (isOpen ? 'open' : '') + '"></i>' +
      '</div>';
    hrow.addEventListener('click', () => { collapsed[di] = !isOpen; render(); });
    block.appendChild(hrow);

    if (isOpen) {
      const body = document.createElement('div');
      body.className = 'day-body';

      dayTasks.forEach(t => {
        const row = document.createElement('div');
        row.className = 'task-row';
        if (!t.isCal) row.draggable = true;
        const tid = String(t.id);

        row.innerHTML =
          '<div class="check-box' + (t.done ? ' checked' : '') + (t.isCal ? ' cal' : '') + '"' +
            ' data-check="' + tid + '" data-iscal="' + (t.isCal ? '1' : '0') + '"' +
            ' role="checkbox" aria-checked="' + t.done + '"' +
            ' style="' + (t.done ? 'background:'+ORANGE+';border-color:'+ORANGE : '') + '">' +
            (t.done ? '<i class="ti ti-check" style="font-size:12px;color:#fff"></i>' : '') +
          '</div>' +
          (t.priority && t.priority !== 'none' ? '<span class="pri-dot p-' + t.priority + '"></span>' : '') +
          '<span class="task-label' + (t.done ? ' done' : '') + '">' + t.text + '</span>' +
          (t.time ? '<span class="task-time">' + t.time + '</span>' : '') +
          (t.isCal ? '<span class="cal-badge">CAL</span>' : '') +
          (!t.isCal ? '<button class="task-del" data-del="' + tid + '" aria-label="Delete"><i class="ti ti-x"></i></button>' : '');

        if (!t.isCal) {
          row.addEventListener('dragstart', () => dragId = tid);
          row.addEventListener('dragend', () => dragId = null);
          row.addEventListener('dragover', e => { e.preventDefault(); row.style.opacity = '.5'; });
          row.addEventListener('dragleave', () => row.style.opacity = '');
          row.addEventListener('drop', e => {
            e.preventDefault(); row.style.opacity = '';
            if (dragId && dragId !== tid) {
              const moved = tasks.find(x => String(x.id) === dragId);
              if (moved) { moved.day = di; saveTask(moved); }
            }
          });
        }
        body.appendChild(row);
      });

      body.addEventListener('click', e => {
        const chk = e.target.closest('[data-check]');
        if (chk) {
          const id = chk.getAttribute('data-check');
          const isCal = chk.getAttribute('data-iscal') === '1';
          if (isCal) {
            const t = calTasks.find(x => String(x.id) === id);
            if (t) { t.done = !t.done; render(); updateProgress(); }
          } else {
            const t = tasks.find(x => String(x.id) === id);
            if (t) { t.done = !t.done; saveTask(t); }
          }
          return;
        }
        const del = e.target.closest('[data-del]');
        if (del) removeTask(del.getAttribute('data-del'));
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      addRow.innerHTML = '<input type="text" placeholder="Add a new task..." aria-label="Add task for ' + DAY_NAMES[di] + '" /><button class="add-row-btn">+</button>';
      const inp = addRow.querySelector('input');
      const doAdd = () => {
        if (inp.value.trim()) {
          saveTask({id: newId(), text: inp.value.trim(), day: di, priority: 'none', done: false});
          inp.value = '';
        }
      };
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
      addRow.querySelector('button').addEventListener('click', doAdd);
      body.appendChild(addRow);
      block.appendChild(body);
    }
    container.appendChild(block);
  });
  updateProgress();
}

const qds = document.getElementById('quick-day-sel');
DAY_SHORT.forEach((d, i) => {
  const o = document.createElement('option');
  o.value = i; o.textContent = d + (i === todayColIdx ? ' ·' : '');
  if (i === todayColIdx) o.selected = true;
  qds.appendChild(o);
});

document.getElementById('quick-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const inp = document.getElementById('quick-input');
  const day = parseInt(document.getElementById('quick-day-sel').value);
  const pri = document.getElementById('quick-pri-sel').value;
  const txt = inp.value.trim();
  if (!txt || isNaN(day)) return;
  saveTask({id: newId(), text: txt, day: day, priority: pri, done: false});
  inp.value = ''; inp.focus();
});

let sortCycle = ['none','priority','status'], sortIdx = 0;
document.getElementById('sort-btn').addEventListener('click', function() {
  sortIdx = (sortIdx + 1) % sortCycle.length;
  sortMode = sortCycle[sortIdx];
  this.innerHTML = sortMode === 'none' ? '<i class="ti ti-arrow-up-down"></i> Sort'
    : sortMode === 'priority' ? '<i class="ti ti-arrow-up-down"></i> Priority'
    : '<i class="ti ti-check"></i> Status';
  render();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  tasks.filter(t => t.done && (!t.weekStart || t.weekStart >= weekStartKey)).forEach(t => removeTask(t.id));
});

updateCalBtn();
if (accessToken) {
  fetchCalendar(false).then(evs => { calTasks = eventsToCalTasks(evs); render(); });
}
</script>
</body>
</html>
